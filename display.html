<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Validator</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Batch Product Validator</h2>

    <div class="form-group">
        <label for="skuInput"><strong>Variant SKU:</strong></label><br>
        <input type="text" id="skuInput" placeholder="e.g., 123456" required>
    </div>

    <div class="form-group">
        <div id="dropZone">
            Drag & Drop product images here<br>
            <small>(Remember: Main image first, Model image fourth)</small>
        </div>
    </div>

    <div class="form-group">
        <strong>Queued Files:</strong>
        <ul id="fileList">
            <li>No files selected yet.</li>
        </ul>
    </div>

    <button id="startButton" onclick="sendFilesToPython()">Start Processing</button>
    <button id="clearButton" onclick="clearQueue()">Clear Queue</button>

    <script src="python-trigger.js"></script>
</body>
</html>
